name: Deploy BioPresence

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build backend package
        working-directory: Backend/java-api
        run: mvn -DskipTests package

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/frontend
          cp Backend/java-api/target/biopresence-api-0.0.1-SNAPSHOT.jar deploy/backend.jar
          cp docker/backend/Dockerfile deploy/Dockerfile.backend
          cp docker/frontend/nginx.conf deploy/nginx.conf
          cp docker/mysql-init/01-init-admin.sql deploy/01-init-admin.sql

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: biopresence-deployment
          path: deploy
