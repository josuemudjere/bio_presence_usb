server:
  address: 0.0.0.0
  port: 8080

spring:
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
  mqtt:
    broker-url: ${APP_MQTT_BROKER_URL:tcp://localhost:1884}
    base-topic: ${APP_MQTT_BASE_TOPIC:biopresence/sensor}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:QmlvUHJlc2VuY2UtZGV2LXNlY3JldC1jaGFuZ2V6LW1vaS1pbXBlcmF0aXZlbWVudC0xMjM0NTY3ODkw}
      expiration-ms: ${APP_SECURITY_JWT_EXPIRATION_MS:86400000}
