server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/biopresence?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
