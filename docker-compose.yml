services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: biopresence-backend
    ports:
      - '8080:8080'
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/biopresence?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      APP_MQTT_BROKER_URL: tcp://mqtt:1883
      APP_MQTT_BASE_TOPIC: biopresence/sensor
    depends_on:
      - db
      - mqtt

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: biopresence-frontend
    ports:
      - '8081:80'
    restart: unless-stopped
    depends_on:
      - backend

  db:
    image: mysql:8.1
    container_name: biopresence-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: biopresence
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro

  mqtt:
    image: eclipse-mosquitto:2
    container_name: biopresence-mosquitto
    restart: unless-stopped
    ports:
      - '1884:1883'
      - '9001:9001'
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  nginx:
    image: nginx:1.25
    container_name: biopresence-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - frontend
      - backend
      - mqtt
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db-data:
    name: biopresence-db-data


